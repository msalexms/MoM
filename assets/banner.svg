<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="mom — Message Of the Day Manager">
  <title>mom — Message Of the Day Manager</title>
  <defs>
    <!-- Scanlines -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000" opacity="0.15"/>
    </pattern>

    <!-- CRT vignette (darker edges) -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="30%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>

    <!-- CRT screen curve glow -->
    <radialGradient id="screen-curve" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a3a35" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a1a0a" stop-opacity="0"/>
    </radialGradient>

    <!-- Center bloom behind title -->
    <radialGradient id="center-bloom" cx="50%" cy="52%" r="35%">
      <stop offset="0%" stop-color="#4a9a8a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a1a0a" stop-opacity="0"/>
    </radialGradient>

    <!-- CRT barrel distortion -->
    <filter id="crt-distortion" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.02" numOctaves="1" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="0.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="displaced"/>
      </feMerge>
    </filter>

    <!-- Phosphor glow - sutil -->
    <filter id="phosphor" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Border glow sutil -->
    <filter id="border-glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .cursor { animation: blink 1s step-end infinite; }

      @keyframes flicker {
        0% { opacity: 0.98; }
        5% { opacity: 0.96; }
        10% { opacity: 0.99; }
        50% { opacity: 0.97; }
        80% { opacity: 0.95; }
        100% { opacity: 0.98; }
      }
      .screen { animation: flicker 4s ease-in-out infinite; }
    </style>
  </defs>

  <!-- ── CRT Screen ─────────────────────────────────────────────── -->
  <rect width="900" height="200" fill="#0f2520" rx="12"/>
  <rect width="900" height="200" fill="url(#screen-curve)" rx="12"/>
  <rect width="900" height="200" fill="url(#center-bloom)" rx="12"/>
  <rect width="900" height="200" fill="url(#scanlines)" rx="12"/>
  <rect width="900" height="200" fill="url(#vignette)" rx="12"/>

  <!-- CRT bezel -->
  <rect x="1" y="1" width="898" height="198" rx="11" fill="none" stroke="#2a6a5a" stroke-width="1" filter="url(#border-glow)" opacity="0.4"/>

  <!-- Screen content with flicker -->
  <g class="screen">

    <!-- Boot messages -->
    <text x="24" y="26" font-family="'Courier New',monospace" font-size="9" fill="#3a7a6a" opacity="0.4">BIOS v2.4 ... OK          MEM: 640K          MOTD subsystem loaded</text>
    <line x1="24" y1="32" x2="876" y2="32" stroke="#3a7a6a" stroke-width="0.5" opacity="0.2"/>

    <!-- Prompt -->
    <text x="24" y="52" font-family="'Courier New',monospace" font-size="11" fill="#4a9a8a">root@mom:~$</text>

    <!-- Main title: centered, big, with CRT distortion -->
    <text x="450" y="120" font-family="'Courier New',monospace" font-size="96" text-anchor="middle" fill="#5ab8a8" filter="url(#crt-distortion) url(#phosphor)">mom</text>

    <!-- Cursor aligned with title -->
    <rect x="550" y="42" width="10" height="76" fill="#5ab8a8" class="cursor" opacity="0.7"/>

    <!-- Separator -->
    <text x="24" y="142" font-family="'Courier New',monospace" font-size="10" fill="#3a7a6a" opacity="0.35">────────────────────────────────────────────────────────────────────────────────</text>

    <!-- Subtitle -->
    <text x="450" y="160" font-family="'Courier New',monospace" font-size="11" text-anchor="middle" fill="#4a9a8a" letter-spacing="3">MESSAGE OF THE DAY MANAGER</text>

    <!-- Bottom info -->
    <text x="24" y="180" font-family="'Courier New',monospace" font-size="9" fill="#3a7a6a" opacity="0.3">modules: 32  |  themes: 6  |  templates: 9  |  type 'mom' to start</text>

    <!-- Right side: small ASCII box -->
    <g transform="translate(740, 48)" font-family="'Courier New',monospace" font-size="9" fill="#3a7a6a" opacity="0.25">
      <text x="0" y="0">  ┌──────┐</text>
      <text x="0" y="12">  │ MOTD │</text>
      <text x="0" y="24">  │  OK  │</text>
      <text x="0" y="36">  └──────┘</text>
      <text x="0" y="52">  [ready]</text>
    </g>

    <!-- Version -->
    <text x="876" y="192" font-family="'Courier New',monospace" font-size="8" text-anchor="end" fill="#3a7a6a" opacity="0.2">v1.0.0</text>

  </g>

</svg>
