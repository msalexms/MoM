<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="mom — Message Of the Day Manager">
  <title>mom — Message Of the Day Manager</title>
  <defs>
    <!-- Scanline pattern -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000" opacity="0.08"/>
    </pattern>

    <!-- Starfield -->
    <pattern id="stars" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="25" r="0.8" fill="#fff" opacity="0.25"/>
      <circle cx="60" cy="90" r="0.6" fill="#fff" opacity="0.15"/>
      <circle cx="95" cy="45" r="1" fill="#fff" opacity="0.2"/>
      <circle cx="35" cy="70" r="0.5" fill="#fff" opacity="0.1"/>
    </pattern>

    <!-- Soft glow for title -->
    <filter id="title-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Title gradient: warm coral → cyan → lime -->
    <linearGradient id="title-grad" x1="300" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="50%" stop-color="#4dd0e1"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>

    <!-- Separator gradient -->
    <linearGradient id="sep-grad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6b8a" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ff6b8a" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#4dd0e1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#66bb6a" stop-opacity="0"/>
    </linearGradient>

    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>

    <style>
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .cursor { animation: blink 1s step-end infinite; }
    </style>
  </defs>

  <!-- ── Background ─────────────────────────────────────────────── -->
  <rect width="900" height="200" fill="url(#bg)"/>
  <rect width="900" height="200" fill="url(#stars)"/>
  <rect width="900" height="200" fill="url(#scanlines)"/>

  <!-- Border -->
  <rect x="2" y="2" width="896" height="196" rx="4" fill="none" stroke="#2a2a4a" stroke-width="1"/>

  <!-- ── Top Bar ────────────────────────────────────────────────── -->
  <rect x="2" y="2" width="896" height="18" fill="#1a1a2e" rx="4"/>
  <circle cx="16" cy="11" r="4" fill="#e57373"/>
  <circle cx="32" cy="11" r="4" fill="#ffb74d"/>
  <circle cx="48" cy="11" r="4" fill="#81c784"/>
  <text x="450" y="15" font-family="monospace" font-size="10" text-anchor="middle" fill="#5c5c8a" letter-spacing="1">mom — message of the day manager</text>

  <!-- ── Left: prompt ───────────────────────────────────────────── -->
  <text x="24" y="46" font-family="monospace" font-size="11" fill="#66bb6a">$ mom</text>

  <!-- ── Right: status ──────────────────────────────────────────── -->
  <circle cx="860" cy="42" r="3" fill="#66bb6a" opacity="0.7"/>
  <text x="850" y="46" font-family="monospace" font-size="9" text-anchor="end" fill="#5c5c8a">ok</text>

  <!-- ── Main Title ─────────────────────────────────────────────── -->
  <text x="450" y="108" font-family="'Arial Black','Impact','Segoe UI Black',sans-serif" font-size="76" font-weight="900" text-anchor="middle" fill="url(#title-grad)" letter-spacing="4" filter="url(#title-glow)">mom</text>

  <!-- Blinking cursor -->
  <rect x="618" y="44" width="8" height="58" fill="#66bb6a" class="cursor" opacity="0.7"/>

  <!-- ── Separator ──────────────────────────────────────────────── -->
  <line x1="120" y1="126" x2="780" y2="126" stroke="url(#sep-grad)" stroke-width="1.5" stroke-dasharray="8,6"/>

  <!-- ── Subtitle ───────────────────────────────────────────────── -->
  <text x="450" y="152" font-family="monospace" font-size="12" text-anchor="middle" fill="#5c5c8a" letter-spacing="4">MESSAGE OF THE DAY MANAGER</text>

  <!-- ── Small rocket (bottom-right corner, subtle) ─────────────── -->
  <g transform="translate(820, 155) scale(0.7)" opacity="0.4">
    <polygon points="8,0 12,10 4,10" fill="#ff6b8a"/>
    <rect x="4" y="10" width="8" height="6" fill="#4dd0e1"/>
    <rect x="2" y="14" width="3" height="3" fill="#ff6b8a"/>
    <rect x="11" y="14" width="3" height="3" fill="#ff6b8a"/>
    <polygon points="6,16 8,22 10,16" fill="#66bb6a"/>
  </g>

</svg>
