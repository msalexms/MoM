<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="mom — Message Of the Day Manager">
  <title>mom — Message Of the Day Manager</title>
  <defs>

    <!-- Dot grid texture -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.75" fill="#1e2430"/>
    </pattern>

    <!-- Base background gradient (top-left darker purple → bottom-right near-black) -->
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#13101f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Radial purple bloom behind the title -->
    <radialGradient id="bloom" cx="450" cy="104" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e1338" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>

    <!-- Title text gradient: cyan → violet → pink  (Dracula palette) -->
    <linearGradient id="title-grad" x1="290" y1="0" x2="610" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8be9fd"/>
      <stop offset="48%"  stop-color="#bd93f9"/>
      <stop offset="100%" stop-color="#ff79c6"/>
    </linearGradient>

    <!-- Separator line: fade-in from left, fade-out to right -->
    <linearGradient id="line-grad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8be9fd" stop-opacity="0"/>
      <stop offset="22%"  stop-color="#bd93f9" stop-opacity="0.55"/>
      <stop offset="78%"  stop-color="#ff79c6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff79c6" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft inner border highlight -->
    <linearGradient id="inner-border" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

  </defs>

  <!-- ── Background layers ─────────────────────────────────────── -->
  <rect width="900" height="200" rx="14" fill="url(#bg)"/>
  <rect width="900" height="200" rx="14" fill="url(#dots)" opacity="0.55"/>
  <rect width="900" height="200" rx="14" fill="url(#bloom)"/>

  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="899" height="199" rx="13.5"
        fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Inner border highlight (gives a subtle "lifted" edge) -->
  <rect x="1.5" y="1.5" width="897" height="197" rx="13"
        fill="none" stroke="url(#inner-border)" stroke-width="1"/>

  <!-- ── Decorations ────────────────────────────────────────────── -->

  <!-- Top-left: shell prompt -->
  <text x="24" y="35"
        font-family="'Courier New',Menlo,Monaco,'Liberation Mono',monospace"
        font-size="12" fill="#3fb950" opacity="0.65">user@linux:~$</text>

  <!-- Top-right: platform badge -->
  <rect x="804" y="14" width="80" height="22" rx="11"
        fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="844" y="29"
        font-family="'Courier New',Menlo,Monaco,monospace"
        font-size="10" text-anchor="middle" fill="#6e7681" letter-spacing="1">linux only</text>

  <!-- ── Title ──────────────────────────────────────────────────── -->
  <text x="450" y="116"
        font-family="'Courier New',Menlo,Monaco,Consolas,'Liberation Mono',monospace"
        font-size="86" font-weight="bold" text-anchor="middle"
        fill="url(#title-grad)" letter-spacing="10">mom</text>

  <!-- ── Separator ─────────────────────────────────────────────── -->
  <line x1="50" y1="142" x2="850" y2="142"
        stroke="url(#line-grad)" stroke-width="1"/>

  <!-- ── Subtitle ───────────────────────────────────────────────── -->
  <text x="450" y="170"
        font-family="'Courier New',Menlo,Monaco,Consolas,'Liberation Mono',monospace"
        font-size="12" text-anchor="middle" fill="#6e7681" letter-spacing="5">
    MESSAGE  OF  THE  DAY  MANAGER
  </text>

</svg>
